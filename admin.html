<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Ember Arena</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .admin-wrap{ max-width:900px; margin:0 auto; padding:64px 24px; }
  .login-card{ max-width:380px; margin:80px auto; background:var(--panel); border:1px solid var(--line); border-radius:4px; padding:32px; }
  .login-card h1{ font-size:24px; margin-bottom:8px; }
  .login-card p{ color:var(--ash); font-size:13px; margin-bottom:20px; }
  table.admin-table{ width:100%; border-collapse:collapse; margin-top:16px; }
  table.admin-table th{ text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--ash); padding:10px 12px; border-bottom:1px solid var(--line); }
  table.admin-table td{ padding:10px 12px; border-bottom:1px solid var(--line); font-size:13px; }
  .top-row{ display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
  .err-box{ font-size:13px; color:var(--blood); margin-top:10px; display:none; }
</style>
</head>
<body>

<div id="loginView" class="login-card">
  <h1 class="disp" style="font-size:20px;">Admin access</h1>
  <p>Enter the admin key from your server's <code>.env</code> file to view registrations.</p>
  <div class="form-row">
    <label for="adminKey">Admin key</label>
    <input type="password" id="adminKey" placeholder="Your ADMIN_KEY">
  </div>
  <button class="btn btn-primary" style="width:100%;" onclick="doLogin()">Log in</button>
  <div class="err-box" id="loginErr"></div>
</div>

<div id="dashView" class="admin-wrap" style="display:none;">
  <div class="top-row">
    <div><span class="tag">// admin</span><h1 class="disp" style="font-size:26px;">Registrations</h1></div>
    <button class="btn btn-ghost" onclick="doLogout()">Log out</button>
  </div>
  <p id="countLabel" style="color:var(--ash); font-size:13px; margin-bottom:8px;"></p>
  <table class="admin-table">
    <thead>
      <tr><th>IGN</th><th>UID</th><th>Mode</th><th>Email</th><th>Phone</th><th>Match</th><th>Paid</th><th>Registered</th></tr>
    </thead>
    <tbody id="regBody"></tbody>
  </table>
</div>

<script>
  const API_BASE = '';

  function getKey(){ return sessionStorage.getItem('ember_admin_key'); }

  async function doLogin(){
    const key = document.getElementById('adminKey').value.trim();
    const errBox = document.getElementById('loginErr');
    errBox.style.display = 'none';
    try{
      const res = await fetch(API_BASE + '/api/admin/login', {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({key})
      });
      const data = await res.json();
      if(!res.ok){ throw new Error(data.error || 'Login failed'); }
      sessionStorage.setItem('ember_admin_key', key);
      showDashboard();
    }catch(e){
      errBox.textContent = e.message;
      errBox.style.display = 'block';
    }
  }

  function doLogout(){
    sessionStorage.removeItem('ember_admin_key');
    document.getElementById('dashView').style.display = 'none';
    document.getElementById('loginView').style.display = 'block';
  }

  async function showDashboard(){
    const key = getKey();
    if(!key) return;
    try{
      const res = await fetch(API_BASE + '/api/admin/registrations', { headers:{'x-admin-key': key} });
      if(res.status === 401){ doLogout(); return; }
      const data = await res.json();
      document.getElementById('loginView').style.display = 'none';
      document.getElementById('dashView').style.display = 'block';
      document.getElementById('countLabel').textContent = `${data.length} total registration${data.length===1?'':'s'}`;
      document.getElementById('regBody').innerHTML = data.slice().reverse().map(r => `
        <tr>
          <td>${r.ign}</td>
          <td class="mono">${r.uid}</td>
          <td>${r.mode}</td>
          <td>${r.email}</td>
          <td class="mono">${r.phone}</td>
          <td>${r.matchId || '—'}</td>
          <td>${r.paymentId ? '<span class="badge badge-verified">Paid</span>' : '<span class="badge badge-soon">Free</span>'}</td>
          <td class="mono" style="font-size:11px;">${new Date(r.createdAt).toLocaleString('en-IN')}</td>
        </tr>
      `).join('');
    }catch(e){
      alert('Could not load registrations.');
    }
  }

  document.addEventListener('DOMContentLoaded', showDashboard);
</script>
</body>
</html>
